spring:

  autoconfigure:
    exclude: org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration

  # --> Spring Ai GenAi Configs
  ai:
    model:
      chat: google-genai

    google:
      genai:
        api-key: ${GENAI_API_KEY}

        chat:
          options:
            model: ${GENAI_MODEL}
            temperature: 0.7
            max-output-tokens: 1024
